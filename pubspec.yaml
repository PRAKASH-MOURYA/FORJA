name: forja
description: FORJA — Your intelligent training companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1

  # Animations
  flutter_animate: ^4.5.0

  # Immutable models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Local persistence
  hive_flutter: ^1.1.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Network detection
  connectivity_plus: ^6.0.0

  # Haptics
  vibration: ^2.0.0

  # Typography
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.12.0
  app_links: ^6.4.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  health: ^13.1.4
  flutter_hooks: ^0.21.3+1
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
